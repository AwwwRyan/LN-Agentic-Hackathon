services:
  - type: web
    name: sitback-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false
    disk:
      name: sitback-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
